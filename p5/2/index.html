<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>p5 background</title>
    <style>
      html, body { height: 100%; margin: 0; }
      canvas { display: block; }           /* no scrollbars from canvas */
      .content { position: relative; z-index: 10; padding: 2rem; color: #111; }
    </style>
  </head>
  <body>
    <main class="content">
      <h1>Hello</h1>
      <p>Scroll and interact with the page; the canvas stays behind.</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.1/lib/p5.min.js"></script>
    <script src="./sketch.js"></script>
  </body>
</html>
